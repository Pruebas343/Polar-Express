<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polar Express</title>
<link rel="shortcut icon" href="./logo.ico" type="image/x-icon">

<style>
*, *::before, *::after {
    box-sizing: border-box;
}

html {
    height: 100%;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    min-height: 100%;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    /* FIX: permitir scroll vertical, nunca ocultar contenido */
    overflow-x: hidden;
    overflow-y: auto;
    padding: 20px 0;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('./fondo.jpg') center/cover no-repeat;
    filter: blur(10px);
    transform: scale(1.1);
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(10, 15, 30, 0.55);
    z-index: -1;
}

/* Nieve */
.snow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
}

.snow span {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: fall linear infinite;
}

@keyframes fall {
    0%   { transform: translateY(-10px); opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
}

/* Card principal */
.card {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 460px;
    padding: clamp(16px, 4vw, 28px);
    border-radius: 20px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    text-align: center;

    display: flex;
    flex-direction: column;
    gap: clamp(10px, 2.5vw, 15px);

    animation: fadeIn 1s ease;
}

/* Imagen portada */
.cover {
    width: clamp(90px, 30vw, 140px);
    height: clamp(90px, 30vw, 140px);
    object-fit: cover;
    border-radius: 16px;
    margin: 0 auto;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    animation: float 4s ease-in-out infinite;
}

/* Tipografía */
h1 {
    margin: 0;
    font-size: clamp(16px, 5vw, 22px);
}

p {
    margin: 0;
    font-size: clamp(13px, 4vw, 16px);
    opacity: 0.8;
}

/* iframes de Spotify */
.iframe-wrapper {
    width: 100%;
    /* FIX: altura dinámica según el viewport disponible */
    height: clamp(80px, 25vh, 152px);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.3s ease;
}

.iframe-wrapper:hover {
    transform: scale(1.02);
}

.iframe-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 12px;
    display: block;
}

/* Pantallas muy pequeñas (ej. iPhone SE 375×667) */
@media (max-height: 600px) {
    body {
        align-items: flex-start;
        padding: 12px 0;
    }

    .cover {
        width: 70px;
        height: 70px;
    }

    .iframe-wrapper {
        height: 80px;
    }

    .card {
        gap: 8px;
    }
}

/* Pantallas medianas (tablets en vertical, móviles grandes) */
@media (min-width: 480px) and (min-height: 700px) {
    .iframe-wrapper {
        height: 180px;
    }
}

/* Pantallas grandes (desktop) */
@media (min-width: 768px) and (min-height: 800px) {
    .iframe-wrapper {
        height: 152px;
    }
}

/* Animaciones */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-8px); }
}
</style>
</head>

<body>

<div class="snow"></div>

<div class="card">

    <img class="cover" src="./fondo.jpg" alt="cover">

    <h1>Now Playing</h1>
    <p>Polar Express</p>

    <!-- Álbum -->
    <div class="iframe-wrapper">
        <iframe
            data-testid="embed-iframe"
            src="https://open.spotify.com/embed/album/0Ddpqifnl3dFLFozKWnAJe?utm_source=generator&theme=0"
            frameborder="0"
            allowfullscreen
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy">
        </iframe>
    </div>

    <!-- Artista -->
    <div class="iframe-wrapper">
        <iframe
            data-testid="embed-iframe"
            src="https://open.spotify.com/embed/artist/7fE2c9R0NCWKhhdSionr2a?utm_source=generator&theme=0"
            frameborder="0"
            allowfullscreen
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy">
        </iframe>
    </div>

</div>

<script>
const snow = document.querySelector('.snow');

for (let i = 0; i < 70; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';
    s.style.animationDelay = (Math.random() * 3) + 's';
    s.style.opacity = Math.random();
    snow.appendChild(s);
}
</script>

</body>
</html>
