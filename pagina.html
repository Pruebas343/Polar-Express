<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polar Express</title>
<link rel="shortcut icon" href="./logo.ico" type="image/x-icon">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('./fondo.jpg') center/cover no-repeat;
    filter: blur(10px);
    transform: scale(1.1);
    z-index: -2;
}


body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(10, 15, 30, 0.55);
    z-index: -1;
}


.snow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
}

.snow span {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10px); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
}


.card {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 420px;
    padding: 25px;
    border-radius: 20px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    text-align: center;

    display: flex;
    flex-direction: column;
    gap: 15px;

    animation: fadeIn 1s ease;
}


.cover {
    width: 140px;
    height: 140px;
    object-fit: cover;
    border-radius: 20px;
    margin: 0 auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: float 4s ease-in-out infinite;
}


h1 {
    margin: 5px 0 0;
    font-size: 22px;
}

p {
    margin: 0;
    opacity: 0.8;
}


iframe {
    width: 100%;
    height: 152px;
    border: none;
    border-radius: 12px;
    transition: transform 0.3s ease;
}

iframe:hover {
    transform: scale(1.02);
}


@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}
</style>
</head>

<body>

<div class="snow"></div>

<div class="card">

    <img class="cover" src="./fondo.jpg" alt="cover">

    <h1>Now Playing</h1>
    <p>Polar Express</p>

    <!-- Álbum -->
   <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/album/0Ddpqifnl3dFLFozKWnAJe?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

    <!-- Artista -->
   <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/artist/7fE2c9R0NCWKhhdSionr2a?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

</div>

<script>
const snow = document.querySelector('.snow');

for (let i = 0; i < 70; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';
    s.style.opacity = Math.random();
    snow.appendChild(s);
}
</script>

</body>
</html>
